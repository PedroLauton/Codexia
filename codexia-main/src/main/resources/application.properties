# Banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/codexia
spring.datasource.username=codexia
spring.datasource.password=codexia

# ConfiguraÁıes do Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Garante que o Flyway rode em bancos que j· possuem dados manuais se necess·rio
spring.flyway.baseline-on-migrate=true 

# ConfiguraÁıes do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

